<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#8B5CF6" />
    
    <!-- Prevenir cache durante desenvolvimento -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Meta tags PWA -->
    <meta name="application-name" content="Learnhub" />
    <meta name="apple-mobile-web-app-title" content="Learnhub" />
    <meta name="msapplication-TileColor" content="#8B5CF6" />
    <meta name="msapplication-config" content="%PUBLIC_URL%/browserconfig.xml" />
    
    <!-- SEO e descrição melhorada -->
    <meta
      name="description"
      content="Learnhub - Plataforma completa para organização de estudos, hábitos, carreira e saúde. Gerencie seus objetivos de forma inteligente e moderna."
    />
    <meta name="keywords" content="estudos, organização, hábitos, carreira, saúde, produtividade, planejamento" />
    <meta name="author" content="Learnhub Team" />
    
    <!-- Open Graph para redes sociais -->
    <meta property="og:title" content="Learnhub - Plataforma de Estudos" />
    <meta property="og:description" content="Organize seus estudos, hábitos e objetivos de forma inteligente" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:url" content="https://learnhub.app" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Learnhub - Plataforma de Estudos" />
    <meta name="twitter:description" content="Organize seus estudos, hábitos e objetivos de forma inteligente" />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />
    
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Manrope:wght@600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Manifest PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- DNS prefetch para Firebase -->
    <link rel="dns-prefetch" href="//firestore.googleapis.com" />
    <link rel="dns-prefetch" href="//firebase.googleapis.com" />
    
    <title>Learnhub - Plataforma de Estudos</title>
    
    <!-- CSS crítico inline para performance -->
    <style>
      /* CSS crítico para loading inicial */
      #root {
        min-height: 100vh;
        background-color: #090b0f;
      }
      
      /* Prevent FOUC */
      body {
        margin: 0;
        background-color: #090b0f;
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      
      /* Loading fallback matching the React Loading component */
      .loading-fallback {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #090b0f;
        color: white;
        z-index: 99999;
      }

      .loading-fallback-glow {
        position: absolute;
        width: 450px;
        height: 450px;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.12) 0%, rgba(6, 182, 212, 0.04) 50%, transparent 70%);
        filter: blur(60px);
        pointer-events: none;
        animation: float-glow-fallback 10s infinite alternate ease-in-out;
      }

      @keyframes float-glow-fallback {
        0% {
          transform: translate(-15%, -15%) scale(1);
        }
        100% {
          transform: translate(15%, 15%) scale(1.2);
        }
      }

      .loading-fallback-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(17, 24, 39, 0.45);
        border: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 3.5rem 4.5rem;
        border-radius: 28px;
        box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.6);
        max-width: 90%;
        width: 320px;
        text-align: center;
        position: relative;
        z-index: 10;
      }

      .loading-logo-text {
        font-family: 'Fredoka', 'Plus Jakarta Sans', sans-serif;
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1.5rem;
        animation: pulse-logo 2s infinite ease-in-out;
        filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.25));
        text-transform: uppercase;
      }

      @keyframes pulse-logo {
        0%, 100% {
          opacity: 0.8;
        }
        50% {
          opacity: 1;
        }
      }

      .loading-progress-container {
        width: 180px;
        height: 3px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 99px;
        overflow: hidden;
        position: relative;
        margin-bottom: 1.5rem;
      }

      .loading-progress-bar {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #3b82f6, #06b6d4);
        border-radius: 99px;
        animation: loading-slide-fallback 1.8s infinite ease-in-out;
        box-shadow: 0 0 10px rgba(6, 182, 212, 0.6);
        position: absolute;
      }

      @keyframes loading-slide-fallback {
        0% {
          left: -40%;
        }
        60% {
          left: 100%;
        }
        100% {
          left: 100%;
        }
      }

      .loading-subtext {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.45);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 2rem; font-family: Arial, sans-serif;">
        <h1>JavaScript Necessário</h1>
        <p>Você precisa habilitar o JavaScript para usar o Learnhub.</p>
        <p>Por favor, habilite o JavaScript em seu navegador e recarregue a página.</p>
      </div>
    </noscript>
    
    <!-- Loading fallback que será substituído pelo React -->
    <div id="loading-fallback" class="loading-fallback">
      <div class="loading-fallback-glow"></div>
      <div class="loading-fallback-card">
        <div class="loading-logo-text">LearnHub</div>
        <div class="loading-progress-container">
          <div class="loading-progress-bar"></div>
        </div>
        <div class="loading-subtext">Carregando plataforma...</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <!-- Script para ocultar loading fallback de forma suave -->
    <script>
      window.addEventListener('load', function() {
        // Manter o loader por pelo menos 2.5 segundos para uma transição suave e premium
        setTimeout(function() {
          const fallback = document.getElementById('loading-fallback');
          if (fallback) {
            fallback.style.transition = 'opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            fallback.style.opacity = '0';
            setTimeout(function() {
              fallback.style.display = 'none';
            }, 600);
          }
        }, 2500);
      });
    </script>
  </body>
</html>
